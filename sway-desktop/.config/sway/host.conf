# Desktop-specific sway config (loaded via include from the shared config).

output DP-1 resolution 3840x2160 position 3840,0
output DP-2 resolution 3840x2160 position 0,0

set $mainMonitor DP-1
set $secondaryMonitor DP-2

exec swayidle -w \
    timeout 300 "~/.config/sway/scripts/manage_vcp.sh save && ~/.config/sway/scripts/manage_vcp.sh dim" \
        resume "~/.config/sway/scripts/manage_vcp.sh restore" \
    timeout 450 'swaymsg "output * dpms off"' \
        resume 'swaymsg "output * dpms on"' \
    timeout 600 'swaymsg "output * power off"' \
        resume 'swaymsg "output * power on"' \
    timeout 3600 'systemctl suspend'

for_window [class="Slack"] floating enable
for_window [app_id="com.slack.Slack"] floating enable
for_window [class="Slack" title="Huddle.*"] resize set default
for_window [app_id="com.slack.Slack" title="Huddle.*"] resize set default

bindsym Ctrl+XF86MonBrightnessUp exec "ddcutil setvcp 10 85 --noverify --display 1 && ddcutil setvcp 10 85 --noverify --display 2"
bindsym XF86MonBrightnessUp exec "ddcutil setvcp 10 70 --noverify --display 1 && ddcutil setvcp 10 70 --noverify --display 2"
bindsym XF86MonBrightnessDown exec "ddcutil setvcp 10 40 --noverify --display 1 && ddcutil setvcp 10 40 --noverify --display 2"
bindsym Ctrl+XF86MonBrightnessDown exec "ddcutil setvcp 10 30 --noverify --display 1 && ddcutil setvcp 10 30 --noverify --display 2"
