# ── Indexing ────────────────────────────────────────────────
set -g base-index 1              # windows start at 1
setw -g pane-base-index 1        # panes start at 1
set -g renumber-windows on       # close a window → gaps auto-fill

# ── Reload config ───────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Splits (intuitive keys, open in current path) ───────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim-style) ──────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Mouse support ────────────────────────────────────────────
set -g mouse on

# ── Terminal & colors ────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Misc quality-of-life ─────────────────────────────────────
set -g history-limit 10000       # scrollback buffer
set -sg escape-time 0            # no delay after Escape (important for vim)
set -g focus-events on           # pass focus events through (helps vim/nvim)
set -g status-interval 5         # refresh status bar every 5s
