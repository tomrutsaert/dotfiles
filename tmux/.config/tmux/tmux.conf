# ── Indexing ────────────────────────────────────────────────
set -g base-index 1              # windows start at 1
setw -g pane-base-index 1        # panes start at 1
set -g renumber-windows on       # close a window → gaps auto-fill

# ── Reload config ───────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Splits (intuitive keys, open in current path) ───────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim-style) ──────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Extended keys (pass Shift+Enter etc. to apps like Claude Code) ──
set -s extended-keys on
set -as terminal-features 'xterm-256color:extkeys'

# ── Mouse (scroll + pane click, with working copy) ─────────
set -g mouse on
setw -g mode-keys vi                # vim keys in copy mode
set -g set-clipboard on             # OSC 52 → system clipboard
bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'WAYLAND_DISPLAY=wayland-1 wl-copy --primary && WAYLAND_DISPLAY=wayland-1 wl-copy'
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'WAYLAND_DISPLAY=wayland-1 wl-copy --primary && WAYLAND_DISPLAY=wayland-1 wl-copy'
bind -n MouseDown2Pane run -b 'wl-paste --no-newline | tmux load-buffer - && tmux paste-buffer -dp'

# ── Terminal & colors ────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Misc quality-of-life ─────────────────────────────────────
set -g history-limit 10000       # scrollback buffer
set -sg escape-time 0            # no delay after Escape (important for vim)
set -g focus-events on           # pass focus events through (helps vim/nvim)
set -g status-interval 5         # refresh status bar every 5s
